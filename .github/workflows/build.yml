name: Build SC2 Companion

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            path: electron
            script: npm run build
            artifact: SC2-Companion-*-portable.exe
            
          - os: macos-latest
            name: macOS
            path: electron
            script: npm run build:mac
            artifact: '*.dmg'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: '${{ matrix.path }}/node_modules'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ${{ matrix.path }}/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/${{ matrix.path }}/package-lock.json') }}

      - name: Install dependencies
        run: |
          cd ${{ matrix.path }}
          npm ci

      - name: Build
        run: |
          cd ${{ matrix.path }}
          ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-exe
          path: |
            ${{ matrix.path }}/dist/**
            !${{ matrix.path }}/dist/**/*.blockmap
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
