<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC2 Companion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }
    
    #app {
      width: 280px;
      height: 380px;
      background: linear-gradient(135deg, rgba(20, 20, 40, 0.95), rgba(30, 30, 60, 0.9));
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }
    
    /* 头部 */
    #header {
      height: 50px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.3);
      cursor: move;
    }
    
    #avatar {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    #title {
      color: white;
      font-size: 14px;
      font-weight: bold;
      flex: 1;
      margin-left: 10px;
    }
    
    #status {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(255, 100, 100, 0.3);
      color: #f44336;
    }
    
    #status.connected {
      background: rgba(76, 175, 80, 0.3);
      color: #4CAF50;
    }
    
    #close-btn {
      width: 20px;
      height: 20px;
      background: rgba(255, 100, 100, 0.8);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 8px;
    }
    
    #close-btn:hover {
      background: rgba(255, 50, 50, 1);
      transform: scale(1.1);
    }
    
    /* 桌宠区域 */
    #live2d-area {
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    #live2d-model {
      font-size: 80px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    #live2d-model.thinking {
      animation: thinking 1s infinite;
    }
    
    @keyframes thinking {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    #speaking-indicator {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      display: none;
    }
    
    #speaking-indicator.active {
      display: block;
    }
    
    /* 快捷操作 */
    #actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .action-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.8), rgba(236, 72, 153, 0.8));
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
    }
    
    .action-btn:active {
      transform: scale(0.95);
    }
    
    /* 聊天框 */
    #chat-box {
      height: 110px;
      margin: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      padding: 10px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    #chat-box::-webkit-scrollbar {
      width: 4px;
    }
    
    #chat-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }
    
    .message {
      margin-bottom: 8px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-size: 12px;
      color: white;
      line-height: 1.4;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message.urgent {
      background: rgba(255, 100, 100, 0.3);
      border-left: 3px solid #f44336;
    }
    
    .message.high {
      background: rgba(255, 200, 100, 0.3);
      border-left: 3px solid #ff9800;
    }
    
    .message.medium {
      background: rgba(100, 200, 255, 0.2);
      border-left: 3px solid #2196F3;
    }
    
    .message.low {
      background: rgba(100, 255, 150, 0.2);
      border-left: 3px solid #4CAF50;
    }
    
    .message.tip {
      font-style: italic;
      opacity: 0.8;
    }
    
    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }
    
    .typing span {
      width: 6px;
      height: 6px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      animation: typingBounce 1s infinite;
    }
    
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes typingBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    /* 底部状态 */
    #footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30px;
      padding: 0 15px;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    #shortcut-hint {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="avatar">🎮</div>
      <div id="title">SC2 Companion</div>
      <div id="status">未连接</div>
      <button id="close-btn">×</button>
    </div>
    
    <div id="live2d-area">
      <div id="live2d-model">✨</div>
      <div id="speaking-indicator">🔊 播报中</div>
    </div>
    
    <div id="actions">
      <button class="action-btn" onclick="captureFrame()">📸 分析</button>
      <button class="action-btn" onclick="toggleMute()">🔊 声音</button>
    </div>
    
    <div id="chat-box">
      <div class="message tip">本小姐准备好了～开始打游戏吧！</div>
    </div>
    
    <div id="footer">
      <span id="shortcut-hint">Ctrl+Shift+C 截帧</span>
      <span id="version">v1.0.0</span>
    </div>
  </div>
  
  <script>
    // 状态
    let isConnected = false;
    let isMuted = false;
    let messages = [];
    
    // DOM 元素
    const statusEl = document.getElementById('status');
    const modelEl = document.getElementById('live2d-model');
    const chatBox = document.getElementById('chat-box');
    const speakingIndicator = document.getElementById('speaking-indicator');
    const closeBtn = document.getElementById('close-btn');
    
    // 初始化
    async function init() {
      // 检查连接状态
      isConnected = await window.sc2Companion.getConnectionStatus();
      updateConnectionStatus(isConnected);
      
      // 监听事件
      window.sc2Companion.onConnectionStatus((status) => {
        updateConnectionStatus(status);
      });
      
      window.sc2Companion.onAdvice((advice) => {
        addMessage(advice.message, advice.priority);
        
        // 更新桌宠表情
        if (advice.priority === 'urgent') {
          modelEl.textContent = '⚠️';
        } else if (advice.priority === 'high') {
          modelEl.textContent = '💡';
        } else {
          modelEl.textContent = '🤔';
        }
        
        // 3秒后恢复
        setTimeout(() => {
          modelEl.textContent = '✨';
        }, 3000);
      });
      
      window.sc2Companion.onPlayAudio((audioUrl) => {
        if (!isMuted) {
          playAudio(audioUrl);
        }
      });
      
      window.sc2Companion.onCaptureStarted(() => {
        modelEl.classList.add('thinking');
        addMessage('正在分析...', 'low');
      });
      
      // 关闭按钮
      closeBtn.onclick = () => {
        window.sc2Companion.hideWindow();
      };
      
      // 窗口拖动
      setupDrag();
    }
    
    // 更新连接状态
    function updateConnectionStatus(status) {
      isConnected = status;
      statusEl.textContent = status ? '已连接' : '未连接';
      statusEl.className = status ? 'connected' : '';
    }
    
    // 添加消息
    function addMessage(text, priority = 'normal') {
      const msg = document.createElement('div');
      msg.className = `message ${priority || ''}`;
      msg.textContent = text;
      
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      
      // 保留最近10条
      while (chatBox.children.length > 10) {
        chatBox.removeChild(chatBox.firstChild);
      }
      
      messages.push({ text, priority });
    }
    
    // 播放音频
    function playAudio(audioUrl) {
      if (!audioUrl) return;
      
      speakingIndicator.classList.add('active');
      modelEl.classList.add('thinking');
      
      const audio = new Audio(audioUrl);
      
      audio.onended = () => {
        speakingIndicator.classList.remove('active');
        modelEl.classList.remove('thinking');
      };
      
      audio.onerror = () => {
        speakingIndicator.classList.remove('active');
        modelEl.classList.remove('thinking');
      };
      
      audio.play().catch(e => {
        console.error('播放失败:', e);
        speakingIndicator.classList.remove('active');
        modelEl.classList.remove('thinking');
      });
    }
    
    // 截帧
    function captureFrame() {
      window.sc2Companion.captureScreen();
    }
    
    // 切换静音
    function toggleMute() {
      isMuted = !isMuted;
      showToast(isMuted ? '🔇 静音' : '🔊 声音');
    }
    
    // 显示提示
    function showToast(text) {
      const toast = document.createElement('div');
      toast.className = 'message';
      toast.textContent = text;
      toast.style.position = 'fixed';
      toast.style.top = '50%';
      toast.style.left = '50%';
      toast.style.transform = 'translate(-50%, -50%)';
      toast.style.background = 'rgba(0, 0, 0, 0.9)';
      toast.style.zIndex = '1000';
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 1500);
    }
    
    // 窗口拖动
    function setupDrag() {
      const header = document.getElementById('header');
      let isDragging = false;
      let startX, startY;
      
      header.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.screenX;
        startY = e.screenY;
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        
        const dx = e.screenX - startX;
        const dy = e.screenY - startY;
        
        window.sc2Companion.moveWindow(
          window.screenX + dx,
          window.screenY + dy
        );
        
        startX = e.screenX;
        startY = e.screenY;
      });
      
      document.addEventListener('mouseup', () => {
        isDragging = false;
      });
    }
    
    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'C') {
        e.preventDefault();
        captureFrame();
      }
    });
    
    // 启动
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
