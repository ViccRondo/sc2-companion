<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC2 Companion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }
    
    #app {
      width: 280px;
      height: 400px;
      background: linear-gradient(135deg, rgba(20, 20, 40, 0.95), rgba(30, 30, 60, 0.9));
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }
    
    /* 头部 */
    #header {
      height: 50px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.3);
      cursor: move;
    }
    
    #avatar {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #8B5CF6, #EC4899);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    #title {
      color: white;
      font-size: 14px;
      font-weight: bold;
      flex: 1;
      margin-left: 10px;
    }
    
    #status {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(255, 100, 100, 0.3);
      color: #f44336;
    }
    
    #status.connected {
      background: rgba(76, 175, 80, 0.3);
      color: #4CAF50;
    }
    
    #close-btn {
      width: 20px;
      height: 20px;
      background: rgba(255, 100, 100, 0.8);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 8px;
    }
    
    #close-btn:hover {
      background: rgba(255, 50, 50, 1);
      transform: scale(1.1);
    }
    
    /* 拖放区域 */
    #drop-zone {
      height: 100px;
      margin: 15px;
      border: 2px dashed rgba(139, 92, 246, 0.5);
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(139, 92, 246, 0.1);
      transition: all 0.3s;
      cursor: pointer;
    }
    
    #drop-zone:hover,
    #drop-zone.dragover {
      border-color: rgba(139, 92, 246, 1);
      background: rgba(139, 92, 246, 0.2);
    }
    
    #drop-zone.analyzing {
      border-color: rgba(236, 72, 153, 1);
      background: rgba(236, 72, 153, 0.1);
    }
    
    #drop-zone-icon {
      font-size: 30px;
      margin-bottom: 5px;
    }
    
    #drop-zone-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      text-align: center;
    }
    
    /* 桌宠区域 */
    #live2d-area {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    #live2d-model {
      font-size: 50px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    #live2d-model.thinking {
      animation: thinking 0.5s infinite;
    }
    
    @keyframes thinking {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    #speaking-indicator {
      position: absolute;
      bottom: 5px;
      right: 10px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.6);
      display: none;
    }
    
    #speaking-indicator.active {
      display: block;
    }
    
    /* 进度条 */
    #progress-bar {
      position: absolute;
      bottom: 55px;
      left: 15px;
      right: 15px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    
    #progress-bar.active {
      display: block;
    }
    
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8B5CF6, #EC4899);
      width: 0%;
      transition: width 0.3s;
    }
    
    #progress-text {
      position: absolute;
      bottom: 62px;
      right: 15px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      display: none;
    }
    
    #progress-text.active {
      display: block;
    }
    
    /* 快捷操作 */
    #actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .action-btn {
      padding: 8px 12px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.8), rgba(236, 72, 153, 0.8));
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
    }
    
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* 聊天框 */
    #chat-box {
      height: 100px;
      margin: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      padding: 10px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    #chat-box::-webkit-scrollbar {
      width: 4px;
    }
    
    #chat-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }
    
    .message {
      margin-bottom: 6px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 11px;
      color: white;
      line-height: 1.4;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.urgent { background: rgba(255, 100, 100, 0.3); border-left: 3px solid #f44336; }
    .message.high { background: rgba(255, 200, 100, 0.3); border-left: 3px solid #ff9800; }
    .message.medium { background: rgba(100, 200, 255, 0.2); border-left: 3px solid #2196F3; }
    .message.low { background: rgba(100, 255, 150, 0.2); border-left: 3px solid #4CAF50; }
    .message.tip { font-style: italic; opacity: 0.8; }
    .message.time { color: rgba(255, 255, 255, 0.5); font-size: 10px; }
    
    /* 底部状态 */
    #footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30px;
      padding: 0 15px;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="avatar">🎮</div>
      <div id="title">SC2 Companion</div>
      <div id="status">未连接</div>
      <button id="close-btn">×</button>
    </div>
    
    <!-- 拖放区域 -->
    <div id="drop-zone">
      <div id="drop-zone-icon">📁</div>
      <div id="drop-zone-text">
        拖放 .SC2Replay 文件<br>
        <small>开始录像复盘</small>
      </div>
    </div>
    
    <!-- 进度条 -->
    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>
    <div id="progress-text">0%</div>
    
    <div id="live2d-area">
      <div id="live2d-model">✨</div>
      <div id="speaking-indicator">🔊 播报中</div>
    </div>
    
    <div id="actions">
      <button class="action-btn" id="btn-capture">📸 截帧</button>
      <button class="action-btn" id="btn-mute">🔊 声音</button>
      <button class="action-btn" id="btn-clear">🗑️ 清空</button>
    </div>
    
    <div id="chat-box">
      <div class="message tip">拖入录像文件，本小姐帮你复盘分析～</div>
    </div>
    
    <div id="footer">
      <span>Ctrl+Shift+C 截帧</span>
      <span>v1.0</span>
    </div>
  </div>
  
  <script>
    // 状态
    let isConnected = false;
    let isMuted = false;
    let isAnalyzing = false;
    let currentProgress = 0;
    
    // DOM
    const dropZone = document.getElementById('drop-zone');
    const dropZoneIcon = document.getElementById('drop-zone-icon');
    const dropZoneText = document.getElementById('drop-zone-text');
    const statusEl = document.getElementById('status');
    const modelEl = document.getElementById('live2d-model');
    const chatBox = document.getElementById('chat-box');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const closeBtn = document.getElementById('close-btn');
    
    // 初始化
    async function init() {
      // 检查连接
      isConnected = await window.sc2Companion.getConnectionStatus();
      updateConnectionStatus(isConnected);
      
      window.sc2Companion.onConnectionStatus(updateConnectionStatus);
      window.sc2Companion.onAdvice(onAdvice);
      window.sc2Companion.onPlayAudio(onPlayAudio);
      window.sc2Companion.onCaptureStarted(onCaptureStarted);
      window.sc2Companion.onReplayProgress(onReplayProgress);
      
      // 拖放事件
      setupDropZone();
      
      // 按钮事件
      document.getElementById('btn-capture').onclick = captureFrame;
      document.getElementById('btn-mute').onclick = toggleMute;
      document.getElementById('btn-clear').onclick = clearChat;
      
      // 关闭按钮
      closeBtn.onclick = () => window.sc2Companion.hideWindow();
      
      // 拖动
      setupDrag();
      
      // 键盘
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey && e.key === 'C') {
          e.preventDefault();
          captureFrame();
        }
      });
    }
    
    // 拖放区域设置
    function setupDropZone() {
      dropZone.ondragover = (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      };
      
      dropZone.ondragleave = () => {
        dropZone.classList.remove('dragover');
      };
      
      dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          const file = files[0];
          if (file.name.toLowerCase().endsWith('.sc2replay')) {
            analyzeReplay(file.path);
          } else {
            addMessage('只支持 .SC2Replay 文件', 'high');
          }
        }
      };
      
      dropZone.onclick = () => {
        // 可以打开文件选择对话框
        addMessage('请拖放录像文件到窗口', 'tip');
      };
    }
    
    // 分析录像
    function analyzeReplay(filePath) {
      if (isAnalyzing) {
        addMessage('正在分析中，请稍候...', 'tip');
        return;
      }
      
      isAnalyzing = true;
      dropZone.classList.add('analyzing');
      dropZoneIcon.textContent = '🔄';
      dropZoneText.innerHTML = '分析中...<br><small>请稍候</small>';
      progressBar.classList.add('active');
      progressText.classList.add('active');
      
      modelEl.classList.add('thinking');
      modelEl.textContent = '📊';
      
      addMessage(`开始分析: ${filePath.split(/[/\\]/).pop()}`, 'medium');
      
      // 发送分析请求
      window.sc2Companion.analyzeReplay(filePath);
    }
    
    // 录像进度
    function onReplayProgress(data) {
      currentProgress = Math.round(data.progress * 100);
      progressFill.style.width = currentProgress + '%';
      progressText.textContent = currentProgress + '%';
      
      if (data.type === 'frame_analysis') {
        const minutes = Math.floor(data.time / 60);
        const seconds = data.time % 60;
        addMessage(`[${minutes}:${seconds.toString().padStart(2, '0')}] ${data.advice}`, 'low');
      } else if (data.type === 'replay_summary') {
        finishAnalyzing();
        addMessage('=== 复盘总结 ===', 'medium');
        if (data.summary.overallAdvice) {
          for (const advice of data.summary.overallAdvice) {
            addMessage(advice, 'high');
          }
        }
      }
    }
    
    function finishAnalyzing() {
      isAnalyzing = false;
      dropZone.classList.remove('analyzing');
      dropZoneIcon.textContent = '✅';
      dropZoneText.innerHTML = '分析完成！<br><small>可拖入新文件</small>';
      progressBar.classList.remove('active');
      progressText.classList.remove('active');
      modelEl.classList.remove('thinking');
      modelEl.textContent = '✨';
      
      setTimeout(() => {
        dropZoneIcon.textContent = '📁';
        dropZoneText.innerHTML = '拖放 .SC2Replay 文件<br><small>开始录像复盘</small>';
      }, 3000);
    }
    
    // 更新连接状态
    function updateConnectionStatus(status) {
      isConnected = status;
      statusEl.textContent = status ? '已连接' : '未连接';
      statusEl.className = status ? 'connected' : '';
    }
    
    // 收到建议
    function onAdvice(advice) {
      addMessage(advice.message, advice.priority);
      
      if (advice.priority === 'urgent') {
        modelEl.textContent = '⚠️';
      } else if (advice.priority === 'high') {
        modelEl.textContent = '💡';
      }
      
      setTimeout(() => {
        modelEl.textContent = '✨';
      }, 3000);
    }
    
    // 播放音频
    function onPlayAudio(audioUrl) {
      if (!isMuted && audioUrl) {
        const audio = new Audio(audioUrl);
        audio.play().catch(() => {});
      }
    }
    
    // 截帧开始
    function onCaptureStarted() {
      modelEl.classList.add('thinking');
      modelEl.textContent = '🔍';
      addMessage('正在分析...', 'tip');
    }
    
    // 添加消息
    function addMessage(text, type = '') {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      
      while (chatBox.children.length > 20) {
        chatBox.removeChild(chatBox.firstChild);
      }
    }
    
    // 截帧
    function captureFrame() {
      window.sc2Companion.captureScreen();
    }
    
    // 静音
    function toggleMute() {
      isMuted = !isMuted;
      document.getElementById('btn-mute').textContent = isMuted ? '🔇' : '🔊';
      addMessage(isMuted ? '已静音' : '已开启声音', 'tip');
    }
    
    // 清空
    function clearChat() {
      chatBox.innerHTML = '<div class="message tip">已清空</div>';
      setTimeout(() => {
        chatBox.innerHTML = '<div class="message tip">拖入录像文件，本小姐帮你复盘分析～</div>';
      }, 1000);
    }
    
    // 拖动窗口
    function setupDrag() {
      const header = document.getElementById('header');
      let isDragging = false, startX, startY;
      
      header.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.screenX;
        startY = e.screenY;
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        window.sc2Companion.moveWindow(window.screenX + e.screenX - startX, window.screenY + e.screenY - startY);
        startX = e.screenX;
        startY = e.screenY;
      });
      
      document.addEventListener('mouseup', () => isDragging = false);
    }
    
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
