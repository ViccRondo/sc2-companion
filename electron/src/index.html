<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SC2 Companion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: transparent;
      font-family: 'Microsoft YaHei', sans-serif;
      color: white;
      overflow: hidden;
      user-select: none;
    }
    
    #app {
      width: 300px;
      height: 400px;
      position: relative;
    }
    
    #live2d-container {
      width: 100%;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: move;
    }
    
    #live2d-model {
      width: 200px;
      height: 200px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }
    
    #chat-box {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      min-height: 60px;
      max-height: 100px;
      overflow-y: auto;
    }
    
    #chat-box .message {
      margin-bottom: 5px;
      padding: 5px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
    }
    
    #chat-box .message.urgent {
      background: rgba(255, 100, 100, 0.3);
      border-left: 3px solid red;
    }
    
    #chat-box .message.high {
      background: rgba(255, 200, 100, 0.3);
      border-left: 3px solid orange;
    }
    
    #status-bar {
      position: absolute;
      top: 5px;
      right: 5px;
      font-size: 10px;
      padding: 2px 6px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
    }
    
    #status-bar.connected {
      color: #4CAF50;
    }
    
    #status-bar.disconnected {
      color: #f44336;
    }
    
    #close-btn {
      position: absolute;
      top: 5px;
      left: 5px;
      width: 20px;
      height: 20px;
      background: rgba(255, 100, 100, 0.8);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 12px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    #app:hover #close-btn {
      opacity: 1;
    }
    
    #close-btn:hover {
      background: rgba(255, 50, 50, 1);
    }
    
    .typing-indicator {
      display: inline-block;
    }
    
    .typing-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      margin: 0 2px;
      animation: typing 1s infinite;
    }
    
    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }
    
    @keyframes typing {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <button id="close-btn" onclick="window.sc2Companion.hideWindow()">×</button>
    <div id="status-bar" class="disconnected">未连接</div>
    
    <div id="live2d-container">
      <div id="live2d-model">🎮</div>
    </div>
    
    <div id="chat-box">
      <div class="message">本小姐准备好了～开始打游戏吧！</div>
    </div>
  </div>
  
  <script>
    // 状态
    let isConnected = false;
    const messages = [];
    
    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      // 检查连接状态
      isConnected = await window.sc2Companion.getConnectionStatus();
      updateConnectionStatus(isConnected);
      
      // 监听连接状态变化
      window.sc2Companion.onConnectionStatus((status) => {
        updateConnectionStatus(status);
      });
      
      // 监听建议
      window.sc2Companion.onAdvice((advice) => {
        addMessage(advice.message, advice.priority);
      });
      
      // 监听音频
      window.sc2Companion.onPlayAudio((audioUrl) => {
        playAudio(audioUrl);
      });
      
      // 窗口拖动
      setupDrag();
    });
    
    function updateConnectionStatus(status) {
      isConnected = status;
      const statusBar = document.getElementById('status-bar');
      statusBar.textContent = status ? '已连接' : '未连接';
      statusBar.className = status ? 'connected' : 'disconnected';
    }
    
    function addMessage(text, priority = 'normal') {
      const chatBox = document.getElementById('chat-box');
      
      const msg = document.createElement('div');
      msg.className = `message ${priority || ''}`;
      msg.textContent = text;
      
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      
      // 保留最近5条
      while (chatBox.children.length > 5) {
        chatBox.removeChild(chatBox.firstChild);
      }
      
      messages.push({ text, priority });
    }
    
    function playAudio(audioUrl) {
      if (!audioUrl) return;
      
      const audio = new Audio(audioUrl);
      audio.play().catch(e => {
        console.error('播放失败:', e);
      });
    }
    
    function setupDrag() {
      const container = document.getElementById('live2d-container');
      let isDragging = false;
      let offsetX, offsetY;
      
      container.addEventListener('mousedown', (e) => {
        isDragging = true;
        offsetX = e.clientX;
        offsetY = e.clientY;
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        
        const dx = e.screenX - offsetX;
        const dy = e.screenY - offsetY;
        
        window.sc2Companion.moveWindow(
          window.screenX + dx,
          window.screenY + dy
        );
        
        offsetX = e.screenX;
        offsetY = e.screenY;
      });
      
      document.addEventListener('mouseup', () => {
        isDragging = false;
      });
    }
    
    // 模拟 SC2 状态更新（测试用）
    function simulateState() {
      window.sc2Companion.updateState({
        gameTime: Math.floor(Math.random() * 600),
        resources: {
          minerals: Math.floor(Math.random() * 2000),
          vespene: Math.floor(Math.random() * 1000),
          foodUsed: Math.floor(Math.random() * 200),
          foodCap: 200
        },
        event: ['idle', 'combat', 'build'][Math.floor(Math.random() * 3)]
      });
    }
    
    // 定期模拟（测试用）
    // setInterval(simulateState, 5000);
  </script>
</body>
</html>
